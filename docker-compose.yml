services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: greenvendor_db
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GreenVendor@123Password"
  api:
    build:
      context: .
      dockerfile: GreenVendor.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=GreenVendor;User Id=sa;Password=GreenVendor@123Password;TrustServerCertificate=True;
    depends_on:
      - db