services:
  db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: greenvendor_db
    ports:
      - "1435:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GreenVendor@123Password"
  api:
    build:
      context: ./backend
      dockerfile: GreenVendor.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db